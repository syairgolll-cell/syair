<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Prediksi Lengkap - Syair Otomatis & Pasaran Full</title>
<style>
body{
  background:#1a1a1a;
  display:flex;
  justify-content:center;
  padding:10px;
  font-family:Arial, sans-serif;
}
/* --- PERLEBAR FRAME --- */
.frame{
  width:550px; /* Diperlebar dari 480px */
  background:url('https://i.pinimg.com/736x/2f/bb/46/2fbb46bf50718eaedd144205f6d386d7.jpg') no-repeat center;
  background-size:cover;
  padding:25px 35px;
  border:10px solid #c5a059;
  border-radius:25px;
  box-shadow:0 0 50px #000;
  text-align:center;
}
/* --- PERBESAR LOGO GOLTOGEL --- */
.logo{
  width:420px; /* Diperbesar signifikan agar tulisan GOLTOGEL sangat jelas */
  margin-bottom:10px;
  filter: drop-shadow(0 0 15px #c5a059);
}
#tanggal{
  color:#c5a059;
  font-weight:bold;
  font-size:26px;
  text-shadow:0 0 12px #c5a059;
  margin-bottom:20px;
}
.header-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
  margin-bottom:25px;
}
.box-container{
  display:flex;
  flex-direction:column;
  align-items:center;
}
#pasaran-logo,
#shio-img{
  width:200px; /* Diperbesar sedikit lagi untuk mengimbangi frame lebar */
  height:200px;
  object-fit:contain;
  border:4px solid #c5a059;
  border-radius:15px;
  padding:10px;
  background:#000;
  box-shadow:0 0 20px rgba(197, 160, 89, 0.6);
}
.label-box {
  color:#c5a059;
  font-size:16px;
  font-weight:bold;
  margin-top:10px;
  text-shadow: 1px 1px 2px #000;
}
select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:2px solid #c5a059;
  font-weight:bold;
  background:#000;
  color:#c5a059;
  border-radius:8px;
  font-size:18px;
  outline: none;
  text-align: center;
  text-align-last: center;
  -webkit-appearance: none;
  appearance: none;
}
.data-table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:15px;
  background:rgba(0,0,0,0.85);
}
.data-table td{
  padding:10px;
  border:1px solid #c5a059;
  color:#c5a059;
  font-weight:bold;
  font-size: 16px;
}
.value{
  color:#fff;
  text-align:center;
  letter-spacing:2px;
}
.syair-box{
  background:#000;
  padding:15px;
  border:1px solid #c5a059;
  font-style:italic;
  color:#c5a059;
  font-size:15px;
  border-radius:8px;
  box-shadow:0 0 10px #c5a059;
  min-height:90px;
  margin-bottom: 15px;
  line-height: 1.7;
  white-space: pre-line;
}
.label-dropdown {
  color: #c5a059;
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 6px;
  display: block;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="frame">
<img class="logo" src="https://omagad.xyz/goltogel/logo/goltogel-logo-header.png">
<div id="tanggal"></div>

<div class="header-container">
  <div class="box-container">
    <img id="pasaran-logo">
    <div class="label-box">PASARAN</div>
  </div>
  <div class="box-container">
    <img id="shio-img">
    <div id="shio-text" class="label-box">-</div>
  </div>
</div>

<select id="pasaran" onchange="updatePrediksi()"></select>

<table class="data-table">
<tr><td>BBFS KUAT</td><td class="value" id="bbfs">-</td></tr>
<tr><td>ANGKA MAIN</td><td class="value" id="am">-</td></tr>
<tr><td>4D (BB)</td><td class="value" id="d4">-</td></tr>
<tr><td>3D (BB)</td><td class="value" id="d3">-</td></tr>
<tr><td>2D (BB)</td><td class="value" id="d2">-</td></tr>
<tr><td>COLOK BEBAS</td><td class="value" id="cb">-</td></tr>
<tr><td>COLOK MACAU</td><td class="value" id="cm">-</td></tr>
<tr><td>INVEST TWIN</td><td class="value" id="tw">-</td></tr>
</table>

<div class="syair-box" id="syair"></div>

<span class="label-dropdown">Link Alternatif Resmi</span>
<select id="linkAlternatif">
  <option value="">-- DAFTAR DOMAIN RESMI --</option>
  <option>GOL30377.COM</option>
  <option>GOL33321.COM</option>
  <option>GOL32191.COM</option>
  <option>GOL31102.COM</option>
  <option>GOL32028.COM</option>
  <option>GOL31236.COM</option>
  <option>GOL30319.COM</option>
  <option>GOL32038.COM</option>
  <option>GOL30990.COM</option>
  <option>GOL81785.COM</option>
  <option>GOL81950.COM</option>
  <option>GOL81514.COM</option>
  <option>GOL81690.COM</option>
  <option>GOL81801.COM</option>
  <option>GOL81863.COM</option>
  <option>GOL2312.COM</option>
  <option>GOL2635.COM</option>
  <option>GOL80561.COM</option>
  <option>GOLTOGEL992.COM</option>
</select>

</div>

<script>
// Logic JavaScript tetap sama dengan BBFS 7 Digit & Syair 2 Bait
function updateTanggal(){
  const hari=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const bulan=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const t=new Date();
  t.setDate(t.getDate()+1); 
  document.getElementById("tanggal").innerHTML = hari[t.getDay()]+", "+t.getDate()+" "+bulan[t.getMonth()]+" "+t.getFullYear();
}
updateTanggal();

const dataShio={
"SHIO : TIKUS":"https://i.pinimg.com/1200x/0a/b8/9c/0ab89c8244c861dc8299f4e3436b96ca.jpg",

"SHIO : MONYET":"https://i.pinimg.com/1200x/b1/53/53/b15353d7971a5ac0f2966fae73424e15.jpg",
"SHIO : AYAM":"https://i.pinimg.com/1200x/e5/d1/dd/e5d1dd9567ebfe22c83da667fbd7ac6f.jpg",

"KING KONG POOLS SORE":"https://cdn.areabermain.club/assets/cdn/az9/2024/11/26/20241126/d1f18e378e4a422b41ffe8d03065ce7d/logo-7.png",

const select=document.getElementById("pasaran");
Object.keys(dataPasaran).forEach(nama=>{
  let opt=document.createElement("option");
  opt.value=nama;
  opt.text=nama;
  select.appendChild(opt);
});

function rand(l){return Math.floor(Math.random()*Math.pow(10,l)).toString().padStart(l,"0");}
function set(len,c){return Array.from({length:c},()=>rand(len)).join(" ");}

const syairBanyak = [
  "Burung nuri terbang ke dahan,Singgah sebentar mencari makan.\nAngka sakti sudah tertahan,Semoga JP jadi kenyataan.",
  "Ke pasar baru membeli baju,Baju biru indah warnanya.\nNiat hati terus melaju,Angka jitu jadi kuncinya.",
  "Malam hari bintang bersinar,Cahaya terang di ufuk timur.\nMencari angka janganlah gentar,Rezeki datang saat tertidur.",
  "Kapal berlayar ke tengah laut,Menerjang ombak tiada henti.\nAngka main janganlah luput,Keberuntungan menanti di hati.",
  "Pergi ke sawah menanam padi,Padi tumbuh hijau berseri.\nPasanglah angka dengan teliti,Kemenangan mutlak sudah memberi.",
  "Awan putih berarak tenang,Angin bertiup sepoi bahasa.\nHati mantap pasti menang,Angka pilihan jadi kuasa.",
  "Gunung tinggi puncaknya biru,Tempat bermukim para dewata.\nAngka keramat sudah menunggu,Menghapus duka menjadi tawa.",
  "Makan sirih di dalam puan,Sirih dikunyah bersama teman.\nJP paus jadi impian,Angka tarung jadi pedoman.",
  "Surya muncul di balik bukit,Menyinari bumi dengan perkasa.\nBukan angka sembarang rakit,Tapi angka penembus masa.",
  "Bunga mawar merah merona,Harum semerbak di taman hati.\nAngka ini sungguh mempesona,Siap meledak sebentar nanti."
];


function generateSyair(angka){
  const template = syairBanyak[Math.floor(Math.random()*syairBanyak.length)];
  return template + "\n(Pola: " + angka + ")";
}

function updatePrediksi(){
  const p=select.value;
  document.getElementById("pasaran-logo").src=dataPasaran[p];
  const sKeys=Object.keys(dataShio);
  const rS=sKeys[Math.floor(Math.random()*sKeys.length)];
  document.getElementById("shio-img").src=dataShio[rS];
  document.getElementById("shio-text").innerText=rS;
  
  document.getElementById("bbfs").innerText=rand(7);
  document.getElementById("am").innerText=rand(5);
  document.getElementById("d4").innerText=set(4,3);
  document.getElementById("d3").innerText=set(3,3);
  document.getElementById("d2").innerText=set(2,8);
  document.getElementById("cb").innerText=Math.floor(Math.random()*9)+"/"+Math.floor(Math.random()*9);
  document.getElementById("cm").innerText=rand(2)+"/"+rand(2);
  document.getElementById("tw").innerText=rand(2)+"/"+rand(2);
  
  const angkaMain=document.getElementById("d2").innerText.split(" ")[0];
  document.getElementById("syair").innerText=generateSyair(angkaMain);
}
updatePrediksi();
</script>
</body>
</html>
