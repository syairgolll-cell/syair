/* --- DROPDOWN PASARAN (LUAR KOTAK) --- */
.outside-select {

}

select#pasaran {

  border-radius: 50px;
  font-size: 22px;
  outline: none;
  text-align: center;
  text-align-last: center;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(197, 160, 89, 0.5);
  text-transform: uppercase;
}

/* --- FRAME UTAMA --- */

  border-radius:30px;

  flex-direction: column;
  gap: 25px;
}

.header-top {

  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid rgba(197, 160, 89, 0.5);
  padding-bottom: 20px;
}

.logo{

}

#tanggal{

  font-weight:bold;
  font-size: 26px;
  text-shadow:0 0 10px #c5a059;
}

.main-content {
  display: flex;
  flex-direction: row;
  gap: 40px;
  align-items: center;
}

.left-column {
  flex: 0 0 320px;
  display: flex;
  flex-direction: column;
  gap: 35px;
  align-items: center;
}

.box-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

#pasaran-logo,
#shio-img {
  width: 250px;
  height: 250px;
  object-fit: contain;
  mix-blend-mode: lighten;
  filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.6));
}

.label-box {
  color:#c5a059;
  font-size:18px;
  font-weight:bold;
  margin-top:8px;
  text-shadow: 2px 2px 4px #000;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* --- TEKS SHIO: GOLD SAJA --- */

  font-weight: 900;
  margin-top: 10px;
  text-align: center;
  text-shadow: 0 0 15px rgba(197, 160, 89, 0.8), 2px 2px 4px #000;
  letter-spacing: 2px;
}

/* --- TABEL & SYAIR --- */
.right-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(0,0,0,0.85);
  border-radius: 10px;
  overflow: hidden;
}

.data-table td {
  padding: 12px 15px;
  border: 1px solid rgba(197, 160, 89, 0.5);
  color: #c5a059;
  font-weight: bold;
  font-size: 18px;
}

.value {
  color: #fff;
  text-align: center !important;
  letter-spacing: 2px;
  font-size: 20px;
}

.syair-box {
  background: rgba(0,0,0,0.85);
  padding: 25px;
  border: 2px solid #c5a059;
  font-style: italic;
  color: #c5a059;
  font-size: 20px;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
  line-height: 1.8;
  white-space: pre-line;
  text-align: center;
}

/* --- BAGIAN BAWAH: DOMAIN GOLD SAJA --- */
.footer-links {
  text-align: center;
}

.label-dropdown {
  color: #c5a059;
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 10px;
  display: block;
  letter-spacing: 4px;
}

select#linkAlternatif {

  border: none;

  color: #c5a059; /* WARNA GOLD */
  font-size: 60px; /* Diperbesar sedikit lagi */
  font-weight: 900;
  text-align: center;
  text-align-last: center;
  outline: none;

  text-shadow: 0 0 20px rgba(197, 160, 89, 0.7), 0 0 40px rgba(197, 160, 89, 0.4);
  cursor: pointer;
  transition: transform 0.3s ease;
}

select#linkAlternatif:hover {
  transform: scale(1.05);
}

select#linkAlternatif option {
  background: #000;
  color: #c5a059;
  font-size: 22px;
}
</style>
